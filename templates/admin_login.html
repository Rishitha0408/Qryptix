{% extends 'base.html' %}

{% block content %}
<div class="glass-panel form-container" style="border: 1px solid rgba(255, 75, 75, 0.3);">
    <h2 style="text-align: center; margin-bottom: 2rem;">Admin <span style="color: var(--danger-color);">Portal</span>
    </h2>
    <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;"><i
            class="fa-solid fa-user-shield"></i> System administrators only.</p>

    <form method="POST" action="{{ url_for('admin_login') }}">
        <div class="form-group">
            <label for="username"><i class="fa-solid fa-user"></i> Admin Username</label>
            <input type="text" id="username" name="username" class="form-control" required placeholder="admin">
        </div>
        <div class="form-group">
            <label for="password"><i class="fa-solid fa-lock"></i> Admin Password</label>
            <input type="password" id="password" name="password" class="form-control" required
                placeholder="admin password">
        </div>
        <button type="submit" class="btn btn-danger btn-block" style="margin-top: 2rem;">Authenticate Admin &nbsp;<i
                class="fa-solid fa-right-to-bracket"></i></button>
    </form>
</div>
{% endblock %}
