{% extends 'base.html' %}

{% block content %}
<div class="glass-panel form-container">
    <h2 style="text-align: center; margin-bottom: 2rem;">Doctor <span class="text-gradient">Login</span></h2>
    <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;"><i
            class="fa-solid fa-user-doctor"></i> Dedicated portal for authorized medical professionals.</p>

    <form method="POST" action="{{ url_for('doctor_login') }}">
        <div class="form-group">
            <label for="username"><i class="fa-solid fa-user"></i> Username</label>
            <input type="text" id="username" name="username" class="form-control" required placeholder="Enter username">
        </div>
        <div class="form-group">
            <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
            <input type="password" id="password" name="password" class="form-control" required
                placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 2rem;">Access Workspace &nbsp;<i
                class="fa-solid fa-right-to-bracket"></i></button>
        <div style="text-align: center; margin-top: 1rem;">
            <p style="font-size: 0.9rem; color: var(--text-muted)">Need an account? <a
                    href="{{ url_for('register') }}">Register Here</a></p>
        </div>
    </form>
</div>
{% endblock %}
