{% extends 'base.html' %}

{% block content %}
<div class="glass-panel form-container">
    <h2 style="text-align: center; margin-bottom: 2rem;">Qryptix Registration<span class="text-gradient">Doctor</span>
        Enrollment</h2>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="full_name"><i class="fa-solid fa-user-doctor"></i> Full Name (as per NMC)</label>
            <input type="text" id="full_name" name="full_name" class="form-control" required
                placeholder="Ex: Dr. John Smith">
        </div>
        <div class="form-group">
            <label for="username"><i class="fa-solid fa-fingerprint"></i> Username</label>
            <input type="text" id="username" name="username" class="form-control" required placeholder="Ex: drsmith">
        </div>
        <div class="form-group">
            <label for="email"><i class="fa-solid fa-envelope"></i> Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required
                placeholder="Ex: dr.smith@example.com">
        </div>
        <div class="form-group">
            <label for="mobile_number"><i class="fa-solid fa-phone"></i> Contact Number</label>
            <input type="tel" id="mobile_number" name="mobile_number" class="form-control" required
                placeholder="Ex: +91 834 567 8900">
        </div>
        <div class="form-group">
            <label for="registration_year"><i class="fa-solid fa-calendar-days"></i> NMC Registration Year</label>
            <input type="number" id="registration_year" name="registration_year" class="form-control" required
                placeholder="Ex: 1999" min="1950" max="2029">
        </div>
        <div class="form-group">
            <label for="state_medical_council"><i class="fa-solid fa-building-columns"></i> State Medical
                Council</label>
            <select id="state_medical_council" name="state_medical_council" class="form-control" required>
                <option value="" disabled selected>-- Select Your Registered Council --</option>
                <option value="Andhra Pradesh Medical Council">Andhra Pradesh Medical Council</option>
                <option value="Arunachal Pradesh Medical Council">Arunachal Pradesh Medical Council</option>
                <option value="Assam Medical Council">Assam Medical Council</option>
                <option value="Bihar Medical Council">Bihar Medical Council</option>
                <option value="Chhattisgarh Medical Council">Chhattisgarh Medical Council</option>
                <option value="Delhi Medical Council">Delhi Medical Council</option>
                <option value="Goa Medical Council">Goa Medical Council</option>
                <option value="Gujarat Medical Council">Gujarat Medical Council</option>
                <option value="Haryana Medical Council">Haryana Medical Council</option>
                <option value="Himachal Pradesh Medical Council">Himachal Pradesh Medical Council</option>
                <option value="Jammu & Kashmir Medical Council">Jammu & Kashmir Medical Council</option>
                <option value="Jharkhand Medical Council">Jharkhand Medical Council</option>
                <option value="Karnataka Medical Council">Karnataka Medical Council</option>
                <option value="Kerala Medical Council">Kerala Medical Council</option>
                <option value="Madhya Pradesh Medical Council">Madhya Pradesh Medical Council</option>
                <option value="Maharashtra Medical Council">Maharashtra Medical Council</option>
                <option value="Manipur Medical Council">Manipur Medical Council</option>
                <option value="Meghalaya Medical Council">Meghalaya Medical Council</option>
                <option value="Mizoram Medical Council">Mizoram Medical Council</option>
                <option value="Nagaland Medical Council">Nagaland Medical Council</option>
                <option value="Odisha Medical Council">Odisha Medical Council</option>
                <option value="Punjab Medical Council">Punjab Medical Council</option>
                <option value="Rajasthan Medical Council">Rajasthan Medical Council</option>
                <option value="Sikkim Medical Council">Sikkim Medical Council</option>
                <option value="Tamil Nadu Medical Council">Tamil Nadu Medical Council</option>
                <option value="Telangana State Medical Council">Telangana State Medical Council</option>
                <option value="Tripura Medical Council">Tripura Medical Council</option>
                <option value="Uttar Pradesh Medical Council">Uttar Pradesh Medical Council</option>
                <option value="Uttarakhand Medical Council">Uttarakhand Medical Council</option>
                <option value="West Bengal Medical Council">West Bengal Medical Council</option>
            </select>
        </div>
        <div class="form-group">
            <label for="license_id"><i class="fa-solid fa-id-badge"></i> National Medical License ID</label>
            <input type="text" id="license_id" name="license_id" class="form-control" required
                placeholder="Ex: GOV-12345678">
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;"><i
                    class="fa-solid fa-circle-info"></i> Your license will be manually verified via the National Medical
                Commission (NMC) portal by admin.
            </p>
        </div>
        <div class="form-group">
            <label for="password"><i class="fa-solid fa-lock"></i> Access Password</label>
            <input type="password" id="password" name="password" class="form-control" required
                placeholder="Use high-entropy password">
        </div>
        <div style="margin-top: 2rem; text-align: center;">
            <p style="font-size: 0.75rem; color: var(--accent-color); margin-bottom: 0.5rem;">
                <i class="fa-solid fa-shield-halved"></i> Lattice-Secured Enrollment Channel Active
            </p>
            <button type="submit" class="btn btn-primary btn-block">
                Initiate Enrollment &nbsp;<i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
        <div
            style="text-align: center; margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;">Already a member?</p>
            <a href="{{ url_for('login') }}" class="btn btn-outline btn-block" style="font-size: 0.9rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Access Portal
            </a>
        </div>
    </form>
</div>
{% endblock %}
