{% extends 'base.html' %}

{% block content %}
<div class="glass-panel form-container">
    <h2 style="text-align: center; margin-bottom: 2rem;">Doctor <span class="text-gradient">Registration</span></h2>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="username"><i class="fa-solid fa-user"></i> Username</label>
            <input type="text" id="username" name="username" class="form-control" required
                placeholder="Choose a username">
        </div>
        <div class="form-group">
            <label for="license_id"><i class="fa-solid fa-id-badge"></i> Govt License ID</label>
            <input type="text" id="license_id" name="license_id" class="form-control" required
                placeholder="Ex: GOV-12345678">
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;"><i
                    class="fa-solid fa-circle-info"></i> Your license will be verified against the secure national
                registry.</p>
        </div>
        <div class="form-group">
            <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
            <input type="password" id="password" name="password" class="form-control" required
                placeholder="Create strong password">
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 2rem;">Register & Apply
            Verification</button>
        <div style="text-align: center; margin-top: 1rem;">
            <p style="font-size: 0.9rem; color: var(--text-muted)">Already registered? <a
                    href="{{ url_for('login') }}">Login Here</a></p>
        </div>
    </form>
</div>
{% endblock %}
